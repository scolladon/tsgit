<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>tsgit browser harness</title>
  </head>
  <body>
    <h1>tsgit browser harness</h1>
    <p>This page is loaded by Playwright. <code>window.__tsgit</code> exposes the
      browser-runtime entry point.</p>
    <script type="module">
      import {
        BrowserCompressor,
        BrowserHashService,
        BrowserHttpTransport,
      } from '/dist/esm/adapters/browser/index.js';
      import {
        detectRuntime,
        isBrowser,
        isNode,
        openRepository,
      } from '/dist/esm/index.browser.js';

      window.__tsgit = {
        openRepository,
        detectRuntime,
        isBrowser,
        isNode,
        adapters: { BrowserCompressor, BrowserHashService, BrowserHttpTransport },
      };
      window.dispatchEvent(new Event('tsgit:ready'));
    </script>
    <script type="module" src="/test/browser/parity-scenarios.bundle.js"></script>
  </body>
</html>
