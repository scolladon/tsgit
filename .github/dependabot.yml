version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - scolladon
    labels:
      - dependencies
    groups:
      stryker:
        patterns:
          - "@stryker-mutator/*"
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
          - "rollup-plugin-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    reviewers:
      - scolladon
    labels:
      - ci
    groups:
      github-actions:
        patterns:
          - "*"
