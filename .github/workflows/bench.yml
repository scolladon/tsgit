name: Nightly benchmarks

on:
  schedule:
    # Every day at 03:14 UTC. Off-peak to keep variance lower.
    - cron: '14 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Restore the scaled bench fixture cache. Keyed on the generator source
      # so any shape change (the version bump included) invalidates it.
      - name: Restore scaled bench fixture cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/tsgit-bench
          key: tsgit-bench-${{ hashFiles('test/bench/support/fixture-generator.ts') }}
      - name: Pre-warm the medium fixture
        run: npm run bench:fixture -- medium
      - run: npm run bench:summary
      - uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: reports/benchmarks/
          retention-days: 30
