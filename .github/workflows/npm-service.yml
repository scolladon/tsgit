name: Publish to npm (trusted publisher)

# Triggered when release-please publishes a GitHub Release.
# Authentication is OIDC — the workflow exchanges its `id-token: write` token
# with npm's registry via the "Trusted Publisher" binding configured on
# npmjs.com. No NPM_TOKEN secret is required; the binding rejects publishes
# from any other repo / workflow file.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # Node 24 ships npm 11.x bundled, which has the trusted-publisher OIDC
      # handshake fix. Node 22's bundled npm 10.9.x signs provenance OK but
      # the PUT auth path doesn't propagate the OIDC token, yielding the
      # misleading 404 "is not in this registry". Upgrading npm in-place via
      # `npm install -g npm@latest` on a Node 22 runner self-corrupts the
      # bundled npm (MODULE_NOT_FOUND promise-retry) because the toolcache
      # install isn't atomically replaceable — Node 24 sidesteps the whole
      # dance.
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build

      # Provenance is signed via the same OIDC token; npm verifies it against
      # the trusted-publisher binding and records the attestation in
      # https://www.npmjs.com/package/@scolladon/tsgit/v/<version>/provenance.
      - run: npm publish --provenance --access public
