name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Tightest-by-default top-level permissions. Individual jobs that need more
# (benchmark-snapshot pushes to gh-pages, benchmark-compare comments on PRs)
# escalate locally.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Static Analysis (parallel, no deps)
  # ──────────────────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:types

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:dead-code

  duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:duplicates

  filesystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:filesystem

  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:architecture

  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:spelling

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:deps

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:security

  # ──────────────────────────────────────────────
  # Stage 2: Build + Verify (needs lint + types)
  # ──────────────────────────────────────────────

  build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run check:size
      - run: npm run check:exports
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Stage 3: Unit Tests (matrix)
  # ──────────────────────────────────────────────

  unit-tests:
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        # Node 20 dropped: cspell@10 + lint-staged@17 require >=22.18 /
        # >=22.22.1; the engines floor matches.
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      # Coverage threshold (100%) is enforced on the Linux gate cell only.
      # Other matrix cells run plain `test:unit` (cross-platform — no
      # platform skipIfs after Phase 14.4's PathPolicy + FsOperations DI
      # refactor).
      - if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
      - if: matrix.os != 'ubuntu-latest'
        run: npm run test:unit
      # Upload regardless of pass/fail so a threshold breach can be diagnosed
      # from the artifact instead of just the failed step. Per-matrix cell
      # naming avoids `actions/upload-artifact@v4` rejecting duplicate names.
      - uses: actions/upload-artifact@v7
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        with:
          name: coverage-report-${{ matrix.os }}-node${{ matrix.node }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Stage 4: Mutation Testing (PRs only, incremental)
  # ──────────────────────────────────────────────

  mutation:
    if: github.event_name == 'pull_request'
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: npm run test:mutation:incremental
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Stage 5: Integration Tests
  # ──────────────────────────────────────────────

  integration:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test:integration

  # ──────────────────────────────────────────────
  # Stage 5b: POSIX-only integration tests
  # Real-fs POSIX semantics (chmod mode bits, ELOOP/EISDIR errnos,
  # symlink permissions). The adapter's response to these errnos is
  # exercised cross-platform in test/unit/ via FsOperations DI; this
  # job covers the real OS→adapter wiring. Phase 14.4.
  # ──────────────────────────────────────────────

  posix-integration:
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test:posix-integration

  # ──────────────────────────────────────────────
  # Stage 5c: Windows-only integration tests
  # Real-fs Windows semantics (8.3 short-name reconciliation, real
  # mkdtemp paths, openRepository drive-letter acceptance, real Windows
  # symlinks). Phase 14.4.
  # ──────────────────────────────────────────────

  win-integration:
    needs: [unit-tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run test:win-integration

  # ──────────────────────────────────────────────
  # Stage 6: E2E / Playwright
  # ──────────────────────────────────────────────

  e2e:
    needs: [integration]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:e2e -- --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: test-results/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Stage 7: Performance
  #   PRs: benchmark-compare diffs base vs PR on the same runner — informative
  #   only, never blocks (same-runner benchmarking carries real measurement noise).
  #   Pushes to main: benchmark-snapshot converts the vitest output via
  #   scripts/bench-to-snapshot.ts and feeds github-action-benchmark for
  #   trend tracking + regression alerts. Its data lives on a dedicated
  #   `gh-pages` data branch; the served Pages site (gh-pages.yml) uses the
  #   Actions artifact model and is unaffected.
  # ──────────────────────────────────────────────

  benchmark-snapshot:
    if: github.event_name == 'push'
    needs: [unit-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Restore scaled bench fixture cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/tsgit-bench
          key: tsgit-bench-${{ hashFiles('test/bench/support/fixture-generator.ts') }}
      - run: npm run test:bench
      - run: node --experimental-strip-types scripts/bench-to-snapshot.ts
      - name: Publish benchmark snapshot
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: tsgit benchmarks
          tool: customSmallerIsBetter
          output-file-path: reports/benchmarks/snapshot.json
          github-token: ${{ github.token }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  benchmark-compare:
    if: github.event_name == 'pull_request'
    needs: [unit-tests]
    runs-on: ubuntu-latest
    # Informative only — a flagged regression is a prompt to look, never a
    # merge gate. Same-runner benchmarking measures too much noise to block on.
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: ./.github/actions/setup

      - name: Build and bench base branch
        run: |
          npm run build
          npm run test:bench
          cp reports/benchmarks/raw.json /tmp/base-bench.json
          rm -rf dist

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          clean: false

      - run: npm ci

      - name: Build and bench PR branch
        run: |
          npm run build
          npm run test:bench
          cp reports/benchmarks/raw.json /tmp/pr-bench.json

      - name: Compare and comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REGRESSION_THRESHOLD: "5"
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const base = JSON.parse(fs.readFileSync('/tmp/base-bench.json', 'utf8'));
          const pr = JSON.parse(fs.readFileSync('/tmp/pr-bench.json', 'utf8'));

          function extractBenchmarks(data) {
            const results = {};
            const files = data?.testResults || data?.files || [];
            for (const file of Array.isArray(files) ? files : []) {
              const groups = file?.groups || file?.benchmarks || [];
              for (const group of Array.isArray(groups) ? groups : []) {
                const benches = group?.benchmarks || [];
                for (const b of Array.isArray(benches) ? benches : []) {
                  if (b.name && b.hz != null) {
                    // Key on `<group> > <bench>` — every scenario registers a
                    // bench literally named `tsgit` / `isomorphic-git`, so a
                    // bare-name key collapses all scenarios onto two entries.
                    const key = group.fullName ? `${group.fullName} > ${b.name}` : b.name;
                    results[key] = { hz: b.hz, mean: b.mean, p99: b.p99 };
                  }
                }
              }
            }
            if (Object.keys(results).length === 0 && typeof data === 'object') {
              for (const [key, val] of Object.entries(data)) {
                if (val && typeof val.hz === 'number') {
                  results[key] = { hz: val.hz, mean: val.mean, p99: val.p99 };
                }
              }
            }
            return results;
          }

          const baseBench = extractBenchmarks(base);
          const prBench = extractBenchmarks(pr);
          const threshold = Number(process.env.REGRESSION_THRESHOLD);
          const allNames = [...new Set([...Object.keys(baseBench), ...Object.keys(prBench)])];

          let hasRegression = false;
          const rows = [];

          for (const name of allNames.sort()) {
            const b = baseBench[name];
            const p = prBench[name];
            if (!b || !p) {
              rows.push(`| ${name} | ${b ? b.hz.toFixed(0) : 'N/A'} | ${p ? p.hz.toFixed(0) : 'N/A'} | - | - |`);
              continue;
            }
            const delta = ((p.hz - b.hz) / b.hz) * 100;
            const status = delta < -threshold ? '🔴 regression' : delta > threshold ? '🟢 faster' : '⚪ neutral';
            if (delta < -threshold) hasRegression = true;
            rows.push(`| ${name} | ${b.hz.toFixed(0)} | ${p.hz.toFixed(0)} | ${delta >= 0 ? '+' : ''}${delta.toFixed(1)}% | ${status} |`);
          }

          if (allNames.length === 0) {
            console.log('No benchmark data to compare.');
            process.exit(0);
          }

          const comment = [
            '## ⚡ Benchmark Comparison (same runner)',
            '',
            `> Regression threshold: ${threshold}%`,
            '',
            '| Benchmark | Base (ops/s) | PR (ops/s) | Delta | Status |',
            '|---|---|---|---|---|',
            ...rows,
            '',
            hasRegression ? '**🔴 Performance regression flagged — informational only (same-runner noise is significant); review the deltas above.**' : '**✅ No performance regression detected.**',
          ].join('\n');

          fs.writeFileSync('/tmp/bench-comment.md', comment);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY || '/dev/null', '\n' + comment + '\n');

          // Informative only — never exit non-zero. A flagged regression is
          // surfaced via the PR comment + step summary above; this job must
          // not fail (same-runner benchmarking is too noisy to gate on).
          if (hasRegression) {
            console.log('Performance regression flagged — informational only; see the PR comment.');
          }
          SCRIPT

      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_TAG: "<!-- benchmark-comparison -->"
        run: |
          # Delete every previous benchmark-comparison comment, then post a
          # single fresh one. Using `jq --arg` (rather than gh --jq with
          # interpolated bash double-quotes) avoids the quote-collapse bug
          # that previously short-circuited the lookup and orphaned every
          # earlier comment on the PR.
          BODY_FILE=/tmp/bench-comment-full.md
          if [ ! -s /tmp/bench-comment.md ]; then
            echo "Benchmark comparison failed to generate." > /tmp/bench-comment.md
          fi
          {
            echo "$COMMENT_TAG"
            cat /tmp/bench-comment.md
          } > "$BODY_FILE"

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg tag "$COMMENT_TAG" '.[] | select(.body | startswith($tag)) | .id' \
            | xargs -r -I{} gh api -X DELETE "repos/${REPO}/issues/comments/{}"

          gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --field body=@"$BODY_FILE"

  # ──────────────────────────────────────────────
  # Stage 8: MegaLinter (parallel, no deps)
  # ──────────────────────────────────────────────

  megalinter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oxsecurity/megalinter@v9
        env:
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: megalinter-report
          path: megalinter-reports/
          retention-days: 14
