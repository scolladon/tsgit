name: Pre-publish verification

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pre-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build
      - run: npm run verify:tarball
