name: Preview package (pkg.pr.new)

# Publishes a transient build of every PR (and every push to main) to the
# public preview registry hosted at https://pkg.pr.new. Consumers can install
# the exact build that ran on a PR with:
#
#   npm install https://pkg.pr.new/scolladon/tsgit@<short-sha>
#   npm install https://pkg.pr.new/scolladon/tsgit@<pr-number>
#
# Nothing reaches the public npm registry — pkg.pr.new is a separate origin.
# The action leaves a comment on the PR with the exact install command.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pkg-pr-new-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run build

      - name: Publish preview to pkg.pr.new
        uses: stackblitz-labs/pkg-pr-new@v0
        with:
          # `comment: update` keeps a single rolling comment per PR instead of
          # appending a new one on each rebuild.
          comment: update
